<style>
  :root {
    --red: #DC143C;
    --red-dark: #b01030;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
    --glass-blur: blur(18px);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920&q=80'); background-size: cover; background-position: center 30%; filter: brightness(0.45) saturate(1.2); }
  .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(5,5,20,0.3) 0%, rgba(10,10,30,0.5) 60%, rgba(5,5,15,0.85) 100%); }
  
  .airplane { position: fixed; top: 28px; left: -80px; font-size: 2rem; z-index: 100; animation: fly 12s linear infinite; filter: drop-shadow(0 4px 12px rgba(220,20,60,0.6)); }
  @keyframes fly { 0% { left: -80px; top: 28px; } 40% { top: 22px; } 60% { top: 32px; } 100% { left: calc(100vw + 80px); top: 18px; } }

  .container { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 30px 20px 60px; }
  .header { text-align: center; margin-bottom: 36px; padding-top: 60px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 7vw, 5rem); font-weight: 900; line-height: 1; text-shadow: 0 4px 30px rgba(0,0,0,0.5); }
  .header h1 span { color: var(--red); }
  .header p { margin-top: 10px; font-size: 1rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  .glass { background: var(--glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px; margin-bottom: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }

  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center; }
  .countdown-item .num { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 700; line-height: 1; text-shadow: 0 0 30px rgba(220,20,60,0.5); }
  .countdown-item .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-top: 4px; }

  .btn { padding: 10px 20px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid var(--glass-border); }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="text"] { flex: 1; padding: 10px 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }

  .shopping-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 8px; }
  .shopping-item.checked { opacity: 0.55; }
  .shopping-item.checked .item-name { text-decoration: line-through; }
  .item-name { flex: 1; font-size: 0.9rem; }
  .item-delete { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 1.1rem; }

  .ticket-card { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px; }
  .ticket-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; cursor: pointer; }
  .ticket-thumb-placeholder { width: 70px; height: 70px; border-radius: 8px; background: rgba(220,20,60,0.15); border: 1px dashed rgba(220,20,60,0.4); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }

  .sync-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 6px; }
  .sync-dot.loading { background: #ffc107; }
  .sync-dot.error { background: var(--red); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="airplane">✈️</div>

<div class="container">
  <div class="header">
    <h1>London<span>.</span></h1>
    <p>May 11, 2026 · 3:00 PM</p>
  </div>

  <details class="glass" style="padding: 15px;">
    <summary style="color:var(--text-muted); cursor:pointer;">⚙️ Dropbox Configuration</summary>
    <div class="input-row" style="margin-top:10px">
      <input type="text" id="tokenInput" placeholder="Paste Access Token..." />
      <button class="btn btn-red" onclick="saveToken()">Save</button>
    </div>
  </details>

  <div class="sync-bar glass">
    <span style="font-size:0.8rem; flex:1;"><span class="sync-dot" id="syncDot"></span><span id="syncStatus">Ready</span></span>
    <button class="btn btn-glass btn-sm" onclick="syncFromCloud()">🔄 Refresh Cloud</button>
  </div>

  <div class="glass">
    <div class="section-title">⏳ Countdown</div>
    <div class="countdown-grid">
      <div class="countdown-item"><div class="num" id="cdDays">--</div><div class="label">Days</div></div>
      <div class="countdown-item"><div class="num" id="cdHours">--</div><div class="label">Hours</div></div>
      <div class="countdown-item"><div class="num" id="cdMins">--</div><div class="label">Minutes</div></div>
    </div>
  </div>

  <div class="glass">
    <div class="section-title">🛍️ Buy for Trip</div>
    <div class="input-row">
      <input type="text" id="shopInput" placeholder="Add item to buy..." onkeydown="if(event.key==='Enter')addItem('shopping', 'shopInput')" />
      <button class="btn btn-red" onclick="addItem('shopping', 'shopInput')">+ Add</button>
    </div>
    <div id="shopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">🇬🇧 Shopping in the UK</div>
    <div class="input-row">
      <input type="text" id="ukShopInput" placeholder="Add item for UK..." onkeydown="if(event.key==='Enter')addItem('ukShopping', 'ukShopInput')" />
      <button class="btn btn-red" onclick="addItem('ukShopping', 'ukShopInput')">+ Add</button>
    </div>
    <div id="ukShopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">📦 Packing List</div>
    <div class="input-row">
      <input type="text" id="packInput" placeholder="Add item to pack..." onkeydown="if(event.key==='Enter')addItem('packing', 'packInput')" />
      <button class="btn btn-red" onclick="addItem('packing', 'packInput')">+ Add</button>
    </div>
    <div id="packList"></div>
  </div>

  <div class="glass">
    <div class="section-title">🎟️ Ticket Vault</div>
    <div class="input-row">
      <input type="text" id="ticketName" placeholder="Ticket name..." />
      <input type="file" id="ticketFile" accept="image/*" style="display:none" onchange="handleTicketFile()" />
      <button class="btn btn-glass" onclick="document.getElementById('ticketFile').click()">📎 Image</button>
      <button class="btn btn-red" onclick="addTicket()">+ Save</button>
    </div>
    <div id="ticketList"></div>
  </div>
</div>

<div class="modal-overlay" id="imgModal" onclick="closeModal()">
  <img class="modal-img" id="modalImg" src="" />
</div>

<script>
const TRAVEL_DATE = new Date('2026-05-11T15:00:00');
const DROPBOX_FILE = '/trip_data.json';
let state = { shopping: [], ukShopping: [], packing: [], tickets: [] };
let pendingTicketImage = null;

// ========= Data Helpers =========
function getToken() { return localStorage.getItem('dropbox_token') || ''; }
function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (val) { localStorage.setItem('dropbox_token', val); syncFromCloud(); }
}
function saveLocal() { localStorage.setItem('london_trip_v3', JSON.stringify(state)); }
function loadLocal() { 
    const raw = localStorage.getItem('london_trip_v3'); 
    if (raw) state = JSON.parse(raw); 
    render(); 
}

// ========= Cloud Sync =========
async function syncToCloud() {
  const token = getToken();
  if (!token) return;
  setSyncStatus('Saving...', 'loading');
  try {
    await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/octet-stream',
        'Dropbox-API-Arg': JSON.stringify({ path: DROPBOX_FILE, mode: 'overwrite' })
      },
      body: JSON.stringify(state)
    });
    setSyncStatus('Cloud Synced ✅');
  } catch (e) { setSyncStatus('Sync Failed ❌', 'error'); }
}

async function syncFromCloud() {
  const token = getToken();
  if (!token) return setSyncStatus('No Token', 'error');
  setSyncStatus('Fetching...', 'loading');
  try {
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path: DROPBOX_FILE }) }
    });
    if (res.ok) {
      state = await res.json();
      saveLocal();
      render();
      setSyncStatus('Cloud Synced ✅');
    }
  } catch (e) { setSyncStatus('Fetch failed', 'error'); }
}

function setSyncStatus(msg, type='ok') {
  document.getElementById('syncStatus').textContent = msg;
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + (type === 'error' ? 'error' : (type === 'loading' ? 'loading' : ''));
}

// ========= List Logic =========
function addItem(listKey, inputId) {
  const inp = document.getElementById(inputId);
  if (!inp.value.trim()) return;
  state[listKey].push({ id: Date.now(), name: inp.value.trim(), checked: false });
  inp.value = '';
  saveAndSync();
}

function toggleItem(listKey, id) {
  const item = state[listKey].find(i => i.id === id);
  if (item) {
    item.checked = !item.checked;
    if (listKey === 'shopping' && item.checked) {
      if(confirm(`Move "${item.name}" to Packing List?`)) {
        state.packing.push({ id: Date.now(), name: item.name, checked: false });
        state.shopping = state.shopping.filter(i => i.id !== id);
      }
    }
  }
  saveAndSync();
}

function deleteItem(listKey, id) {
  state[listKey] = state[listKey].filter(i => i.id !== id);
  saveAndSync();
}

function handleTicketFile() {
  const file = document.getElementById('ticketFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { pendingTicketImage = e.target.result; };
  reader.readAsDataURL(file);
}

function addTicket() {
  const name = document.getElementById('ticketName').value.trim();
  if (!name) return;
  state.tickets.push({ id: Date.now(), name, imageData: pendingTicketImage, addedAt: new Date().toLocaleDateString() });
  document.getElementById('ticketName').value = '';
  pendingTicketImage = null
