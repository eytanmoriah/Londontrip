<style>
  :root { --red: #DC143C; --glass: rgba(255,255,255,0.12); --glass-border: rgba(255,255,255,0.25); --text: #ffffff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920'); background-size: cover; background-position: center; filter: brightness(0.4); }
  .container { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 20px 20px 60px; }
  .glass { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
  .header { text-align: center; margin: 40px 0 30px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; }
  .header h1 span { color: var(--red); }
  .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); }
  .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
  input[type="text"] { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; }
  .item-row.checked { opacity: 0.5; text-decoration: line-through; }
  .item-name { flex: 1; font-size: 0.95rem; }
  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
  .num { font-size: 2.8rem; font-weight: 700; font-family: 'Playfair Display'; }
  .airplane { position: fixed; top: 28px; left: -80px; font-size: 2rem; z-index: 100; animation: fly 15s linear infinite; }
  @keyframes fly { 0% { left: -80px; } 100% { left: 110vw; } }

<div class="bg"></div>

<div class="container">
  <div class="header">

  <div class="glass" style="padding:15px;">

      <span id="syncStatus">☁️ Dropbox: Waiting...</span>

    <div class="input-row" style="margin-top:15px">
      <input type="text" id="tokenInput" placeholder="Dropbox Access Token">
      <button class="btn btn-red" onclick="saveToken()">Save & Sync</button>
    </div>
    <button class="btn btn-glass" style="width:100%; margin-top:10px;" onclick="requestNotifPermission()">Enable Morning Countdown Alerts</button>
  </div>

  <div class="glass">
    <div class="countdown-grid">
      <div><div class="num" id="cdDays">--</div><div style="font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5)">Days</div></div>
      <div><div class="num" id="cdHours">--</div><div style="font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5)">Hours</div></div>
      <div><div class="num" id="cdMins">--</div><div style="font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5)">Mins</div></div>
    </div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">🛍️ Buy for Trip</h3>
    <div class="input-row">
      <input type="text" id="shopInput" placeholder="Add items...">
      <button class="btn btn-red" onclick="addItem('shopping', 'shopInput')">+</button>
    </div>
    <div id="shopList"></div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">🇬🇧 Shopping in the UK</h3>
    <div class="input-row">
      <input type="text" id="ukInput" placeholder="Add items...">
      <button class="btn btn-red" onclick="addItem('ukShopping', 'ukInput')">+</button>
    </div>
    <div id="ukList"></div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">📦 Packing List</h3>
    <div class="input-row">
      <input type="text" id="packInput" placeholder="Add items...">
      <button class="btn btn-red" onclick="addItem('packing', 'packInput')">+</button>
    </div>
    <div id="packList"></div>
  </div>
</div>

<script>
const TRAVEL_DATE = new Date('2026-05-11T15:00:00');
const FILE_PATH = '/trip_data.json';
let state = { shopping: [], ukShopping: [], packing: [], tickets: [] };

// --- NOTIFICATIONS ---
function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      document.getElementById('notifStatus').textContent = '🔔 Notifications: Active';
      new Notification("London Trip", { body: "Morning countdown alerts enabled!" });
    }
  });
}

function checkMorningNotif() {
  const now = new Date();
  const last = localStorage.getItem('last_notif_date');
  // Send if it's 9:00 AM and we haven't sent one today
  if (now.getHours() === 9 && last !== now.toDateString()) {
    if (Notification.permission === 'granted') {
      const days = Math.floor((TRAVEL_DATE - now) / 86400000);
      new Notification("Good Morning!", { body: `${days} days until London! 🇬🇧` });
      localStorage.setItem('last_notif_date', now.toDateString());
    }
  }
}
