<style>
  :root { --red: #DC143C; --glass: rgba(255,255,255,0.12); --glass-border: rgba(255,255,255,0.25); --text: #ffffff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920'); background-size: cover; background-position: center; filter: brightness(0.4); }
  .container { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
  .glass { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
  .header { text-align: center; margin: 40px 0 30px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; }
  .header h1 span { color: var(--red); }
  .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: 0.2s; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); }
  .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
  input[type="text"] { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; }
  .item-row.checked { opacity: 0.5; text-decoration: line-through; }
  .item-name { flex: 1; font-size: 0.95rem; }
  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
  .num { font-size: 2.8rem; font-weight: 700; font-family: 'Playfair Display'; display: block; min-height: 1em; }
  .ticket-card { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
  .ticket-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #333; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
  .airplane { position: fixed; top: 28px; left: -80px; font-size: 2rem; z-index: 100; animation: fly 15s linear infinite; }
  @keyframes fly { 0% { left: -80px; } 100% { left: 110vw; } }
</style>
</head>
<body>

<div class="bg"></div>
<div class="airplane">✈️</div>

<div class="container">
  <div class="header">
    <h1>London<span>.</span></h1>
    <p>May 11, 2026 · 15:00</p>
  </div>

  <div class="glass">
    <div style="display:flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px;">
      <span id="syncStatus">☁️ Dropbox: Offline</span>
      <span id="notifStatus">🔔 Alerts: Disabled</span>
    </div>
    <div class="input-row">
      <input type="text" id="tokenInput" placeholder="Paste Dropbox Token Here">
      <button class="btn btn-red" onclick="saveToken()">Connect</button>
    </div>
    <button class="btn btn-glass" style="width:100%;" onclick="requestNotifPermission()">Enable Morning Notifications</button>
  </div>

  <div class="glass">
    <div class="countdown-grid">
      <div><span class="num" id="cdDays">00</span><div style="font-size:0.7rem; color:rgba(255,255,255,0.5)">DAYS</div></div>
      <div><span class="num" id="cdHours">00</span><div style="font-size:0.7rem; color:rgba(255,255,255,0.5)">HOURS</div></div>
      <div><span class="num" id="cdMins">00</span><div style="font-size:0.7rem; color:rgba(255,255,255,0.5)">MINS</div></div>
    </div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">🛍️ Buy for Trip</h3>
    <div class="input-row">
      <input type="text" id="shopInput" placeholder="Add item...">
      <button class="btn btn-red" onclick="addItem('shopping', 'shopInput')">Add</button>
    </div>
    <div id="shopList"></div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">🇬🇧 Shopping in UK</h3>
    <div class="input-row">
      <input type="text" id="ukInput" placeholder="Add item...">
      <button class="btn btn-red" onclick="addItem('ukShopping', 'ukInput')">Add</button>
    </div>
    <div id="ukList"></div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">📦 Packing List</h3>
    <div class="input-row">
      <input type="text" id="packInput" placeholder="Add item...">
      <button class="btn btn-red" onclick="addItem('packing', 'packInput')">Add</button>
    </div>
    <div id="packList"></div>
  </div>

  <div class="glass">
    <h3 style="margin-bottom:15px">🎟️ Ticket Vault</h3>
    <div class="input-row">
      <input type="text" id="ticketName" placeholder="Ticket Name">
      <input type="file" id="ticketFile" accept="image/*" style="display:none" onchange="processTicket()">
      <button class="btn btn-glass" onclick="document.getElementById('ticketFile').click()">📷</button>
      <button class="btn btn-red" onclick="addTicket()">Save</button>
    </div>
    <div id="ticketList"></div>
  </div>
</div>

<div class="modal" id="imgModal" onclick="this.style.display='none'"><img id="fullImg" style="max-width:95%; max-height:95%;"></div>

<script>
const TRAVEL_DATE = new Date('2026-05-11T15:00:00').getTime();
let state = { shopping: [], ukShopping: [], packing: [], tickets: [] };
let tempImg = null;

// --- DROPBOX ---
async function syncToCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  try {
    const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Dropbox-API-Arg': JSON.stringify({ path: '/trip_data.json', mode: 'overwrite' }),
        'Content-Type': 'application/octet-stream'
      },
      body: JSON.stringify(state)
    });
    document.getElementById('syncStatus').textContent = res.ok ? '☁️ Dropbox: Synced ✅' : '☁️ Dropbox: Sync Error';
  } catch (e) { console.error(e); }
}

async function syncFromCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  try {
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Dropbox-API-Arg': JSON.stringify({ path: '/trip_data.json' }) }
    });
    if (res.ok) { state = await res.json(); render(); saveLocal(); document.getElementById('syncStatus').textContent = '☁️ Dropbox: Connected ✅'; }
  } catch (e) { console.error(e); }
}

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if(t) { localStorage.setItem('dropbox_token', t); syncFromCloud(); }
}

// --- CORE APP ---
function saveLocal() { localStorage.setItem('ldn_v4', JSON.stringify(state)); }
function loadLocal() { const d = localStorage.getItem('ldn_v4'); if(d) state = JSON.parse(d); render(); }

function addItem(key, inpId) {
  const inp = document.getElementById(inpId);
  if(!inp.value) return;
  state[key].push({ id: Date.now(), name: inp.value, checked: false });
  inp.value = ''; saveAndSync();
}

function toggleItem(key, id) {
  const item = state[key].find(i => i.id === id);
  if(item) {
    item.checked = !item.checked;
    if(key === 'shopping' && item.checked && confirm("Move to Packing List?")) {
        state.packing.push({ id: Date.now(), name: item.name, checked: false });
        state.shopping = state.shopping.filter(i => i.id !== id);
    }
  }
  saveAndSync();
}

function deleteItem(key, id) { state[key] = state[key].filter(i => i.id !== id); saveAndSync(); }
function saveAndSync() { saveLocal(); render(); syncToCloud(); }

// --- TICKETS ---
function processTicket() {
  const file = document.getElementById('ticketFile').files[0];
  const reader = new FileReader();
  reader.onload = e => tempImg = e.target.result;
  reader.readAsDataURL(file);
}

function addTicket() {
  const name = document.getElementById('ticketName').value;
  if(!name || !tempImg) return;
  state.tickets.push({ id: Date.now(), name, img: tempImg
