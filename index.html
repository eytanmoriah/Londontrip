<style>
  :root { --red: #DC143C; --glass: rgba(255,255,255,0.12); --glass-border: rgba(255,255,255,0.25); --text: #ffffff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920'); background-size: cover; background-position: center; filter: brightness(0.4); }
  .container { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
  .glass { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
  .header { text-align: center; margin: 40px 0 20px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; }
  .header h1 span { color: var(--red); }
  .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: 0.2s; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); }
  .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
  input[type="text"] { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; }
  .item-row.checked { opacity: 0.5; text-decoration: line-through; }
  .item-name { flex: 1; font-size: 0.95rem; }
  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
  .num { font-size: 2.8rem; font-weight: 700; font-family: 'Playfair Display'; display: block; }
  .ticket-card { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
  .ticket-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #333; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
  .airplane { position: fixed; top: 28px; left: -80px; font-size: 2rem; z-index: 100; animation: fly 15s linear infinite; }
  @keyframes fly { 0% { left: -80px; } 100% { left: 110vw; } }
</style>

<div class="container">

      <span style="font-size:0.8rem; margin-left:10px; opacity:0.7;">Photo ready ✅</span>
    </div>

  </div>

<div class="modal" id="imgModal" onclick="this.style.display='none'"><img id="fullImg" style="max-width:95%; max-height:95%;"></div>

<script>
const TRAVEL_DATE = new Date('2026-05-11T15:00:00').getTime();

let state = { shopping: [], ukShopping: [], packing: [] };
let tickets = []; // { id, name } — images live in IndexedDB, not here
let tempImg = null;

// =============================================================
// INDEXEDDB — unlimited local image storage, no quota issues
// =============================================================
let db;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('LondonTrip', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('images', { keyPath: 'id' });
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = reject;
  });
}
function saveImage(id, dataUrl) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').put({ id, dataUrl });
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}
function getImage(id) {
  return new Promise((resolve) => {
    const tx = db.transaction('images', 'readonly');
    const req = tx.objectStore('images').get(id);
    req.onsuccess = () => resolve(req.result?.dataUrl || null);
    req.onerror = () => resolve(null);
  });
}
function deleteImage(id) {
  return new Promise((resolve) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(id);
    tx.oncomplete = resolve;
    tx.onerror = resolve;
  });
}
function getAllImageIds() {
  return new Promise((resolve) => {
    const tx = db.transaction('images', 'readonly');
    const req = tx.objectStore('images').getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

// =============================================================
// LOCAL STATE — localStorage for lists, IndexedDB for images
// =============================================================
function saveLocal() {
  try { localStorage.setItem('ldn_v8', JSON.stringify({ state, tickets })); } catch(e) {}
}

async function loadLocal() {
  const raw = localStorage.getItem('ldn_v8');
  if (raw) {
    const d = JSON.parse(raw);
    state = d.state || state;
    tickets = d.tickets || [];
  }
  await renderTicketsWithImages();
  render();
}

// Render ticket list, fetching images from IndexedDB for display
async function renderTicketsWithImages() {
  const listEl = document.getElementById('ticketList');
  if (!listEl) return;
  const rows = await Promise.all(tickets.map(async t => {
    const img = await getImage(t.id);
    return `
      <div class="ticket-card" onclick="viewTicket(${t.id})">
        ${img
          ? `<img src="${img}" class="ticket-thumb">`
          : `<div class="ticket-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🎟️</div>`
        }
        <span style="flex:1">${t.name}</span>
        <button onclick="event.stopPropagation(); deleteTicket(${t.id})" style="background:none;border:none;color:white;opacity:0.3;font-size:1rem">✕</button>
      </div>`;
  }));
  listEl.innerHTML = rows.join('');
}

// --- WEATHER ---
async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current_weather=true');
    const data = await res.json();
    document.getElementById('londonTemp').textContent = Math.round(data.current_weather.temperature) + '°C';
  } catch (e) {}
}

// =============================================================
// DROPBOX SYNC
// Strategy:
//   trip_data.json  — lists + ticket metadata (names + ids)
//   /tickets/{id}   — one file per ticket image (raw base64 dataUrl)
//
// On upload: only upload images that aren't already in Dropbox.
// On download: MERGE cloud tickets with local tickets (additive,
//   never delete what another device added). Each device only
//   downloads images it doesn't already have locally.
// =============================================================
async function dbxUpload(token, path, body) {
  return fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Dropbox-API-Arg': JSON.stringify({ path, mode: 'overwrite' }),
      'Content-Type': 'application/octet-stream'
    },
    body
  });
}
async function dbxDownload(token, path) {
  return fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Dropbox-API-Arg': JSON.stringify({ path }) }
  });
}

async function syncToCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  setStatus('☁️ Syncing…');
  try {
    // 1. Read current cloud manifest to do a proper merge before overwriting
    let cloudTickets = [];
    try {
      const r = await dbxDownload(token, '/trip_data.json');
      if (r.ok) { const d = await r.json(); cloudTickets = d.tickets || []; }
    } catch(e) {}

    // Merge: union of cloud + local tickets (additive, keep all)
    const merged = mergeTickets(cloudTickets, tickets);

    // 2. Upload merged manifest
    const payload = { ...state, tickets: merged.map(t => ({ id: t.id, name: t.name })) };
    const res = await dbxUpload(token, '/trip_data.json', JSON.stringify(payload));
    if (!res.ok) { setStatus('☁️ Sync Error ❌'); return; }

    // 3. Upload only images we have locally that aren't yet in Dropbox
    const localImageIds = await getAllImageIds();
    const localIdSet = new Set(localImageIds.map(String));
    for (const t of merged) {
      if (localIdSet.has(String(t.id))) {
        const img = await getImage(t.id);
        if (img) await dbxUpload(token, `/tickets/${t.id}`, img);
      }
    }

    // 4. Update local tickets list to the merged set (adds anything from cloud we didn't have)
    tickets = merged;
    saveLocal();
    await renderTicketsWithImages();
    setStatus('☁️ Synced ✅');
  } catch(e) {
    setStatus('☁️ Offline ❌');
  }
}

async function syncFromCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  setStatus('☁️ Connecting…');
  try {
    // 1. Download manifest
    const res = await dbxDownload(token, '/trip_data.json');
    if (!res.ok) { setStatus('☁️ No cloud data yet'); return; }
    const data = await res.json();

    // 2. Merge lists (cloud wins for shopping/packing — last write wins is fine for lists)
    if (data.shopping)   state.shopping   = data.shopping;
    if (data.ukShopping) state.ukShopping = data.ukShopping;
    if (data.packing)    state.packing    = data.packing;

    // 3. ADDITIVE merge of tickets — keep everything from both cloud and local
    const cloudTickets = data.tickets || [];
    tickets = mergeTickets(cloudTickets, tickets);

    // 4. Download images we don't have locally yet (new tickets from other devices)
    const localImageIds = new Set((await getAllImageIds()).map(String));
    let newImagesFound = false;
    for (const t of tickets) {
      if (!localImageIds.has(String(t.id))) {
        try {
          const imgRes = await dbxDownload(token, `/tickets/${t.id}`);
          if (imgRes.ok) {
            const imgData = await imgRes.text();
            await saveImage(t.id, imgData);
            newImagesFound = true;
          }
        } catch(e) { /* image not uploaded yet by other device, skip */ }
      }
    }

    saveLocal();
    render();
    await renderTicketsWithImages();
    setStatus('☁️ Connected ✅');
  } catch(e) {
    console.error(e);
    setStatus('☁️ Sync Error ❌');
  }
}

// Merge two ticket arrays by id — union, no duplicates, preserves order (oldest first)
function mergeTickets(a, b) {
  const seen = new Map();
  for (const t of [...a, ...b]) {
    if (!seen.has(t.id)) seen.set(t.id, t);
  }
  return Array.from(seen.values()).sort((x, y) => x.id - y.id);
}

function setStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (t) { localStorage.setItem('dropbox_token', t); syncFromCloud(); }
}

// --- CORE APP LOGIC ---
function addItem(key, inpId) {
  const inp = document.getElementById(inpId);
  if (!inp.value.trim()) return;
  state[key].push({ id: Date.now(), name: inp.value.trim(), checked: false });
  inp.value = '';
  saveAndSync();
}

// FIX: toggleItem for 'shopping' — only toggle checked state if user cancels the move dialog.
function toggleItem(key, id) {
  const item = state[key].find(i => i.id === id);
  if (!item) return;

  if (key === 'shopping') {
    if (!item.checked) {
      if (confirm("Move this to Packing List?")) {
        state.packing.push({ id: Date.now(), name: item.name, checked: false });
        state.shopping = state.shopping.filter(i => i.id !== id);
        saveAndSync();
        return;
      }
    }
    item.checked = !item.checked;
  } else {
    item.checked = !item.checked;
  }
  saveAndSync();
}

function deleteItem(key, id) {
  state[key] = state[key].filter(i => i.id !== id);
  saveAndSync();
}

// Debounced sync for list changes
let syncTimer = null;
function saveAndSync() {
  saveLocal();
  render();
  setStatus('☁️ Pending…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 2000);
}

// --- TICKET VAULT ---
function processTicket(input) {
  const file = input.files[0];
  if (!file) return;
  // Compress image before storing: resize to max 1200px wide, quality 0.7
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX = 1200;
    let w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    tempImg = canvas.toDataURL('image/jpeg', 0.7);
    URL.revokeObjectURL(url);
    document.getElementById('previewImg').src = tempImg;
    document.getElementById('photoPreview').style.display = 'block';
    setStatus('📸 Photo Ready');
  };
  img.src = url;
}

async function addTicket() {
  const nameInput = document.getElementById('ticketName');
  if (!nameInput.value.trim() || !tempImg) {
    alert("Please enter a name and take/select a photo first!");
    return;
  }
  const id = Date.now();
  tickets.push({ id, name: nameInput.value.trim() });
  await saveImage(id, tempImg);  // stored in IndexedDB — no size limit
  nameInput.value = '';
  tempImg = null;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('ticketFile').value = '';
  saveLocal();
  await renderTicketsWithImages();
  setStatus('☁️ Pending…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 2000);
}

async function deleteTicket(id) {
  tickets = tickets.filter(t => t.id !== id);
  await deleteImage(id);
  saveLocal();
  await renderTicketsWithImages();
  setStatus('☁️ Pending…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 2000);
}

async function viewTicket(id) {
  const img = await getImage(id);
  if (!img) { alert("Image not yet downloaded from cloud. Try syncing again."); return; }
  document.getElementById('fullImg').src = img;
  document.getElementById('imgModal').style.display = 'flex';
}

// --- UI RENDER (lists only — tickets handled by renderTicketsWithImages) ---
function render() {
  const configs = [
    { k: 'shopping', e: 'shopList' },
    { k: 'ukShopping', e: 'ukShopList' },
    { k: 'packing', e: 'packList' }
  ];
  configs.forEach(conf => {
    const listEl = document.getElementById(conf.e);
    if (!listEl) return;
    listEl.innerHTML = state[conf.k].map(i => `
      <div class="item-row ${i.checked ? 'checked' : ''}">
        <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem('${conf.k}', ${i.id})">
        <span class="item-name">${i.name}</span>
        <button onclick="deleteItem('${conf.k}', ${i.id})" style="background:none; border:none; color:white; opacity:0.3">✕</button>
      </div>`).join('');
  });
}

function updateCD() {
  const diff = TRAVEL_DATE - new Date().getTime();
  if (diff < 0) return;
  document.getElementById('cdDays').textContent = Math.floor(diff / 86400000);
  document.getElementById('cdHours').textContent = Math.floor((diff % 86400000) / 3600000);
  document.getElementById('cdMins').textContent = Math.floor((diff % 3600000) / 60000);
}

// --- NOTIFICATIONS ---
function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    if (p === "granted") {
      document.getElementById('notifStatus').textContent = 'Alerts: Active';
      new Notification("London Trip", { body: "Morning countdown alerts enabled!" });
    }
  });
}

function checkNotif() {
  const now = new Date();
  if (now.getHours() === 9 && localStorage.getItem('last_notif') !== now.toDateString()) {
    if (Notification.permission === 'granted') {
      const days = Math.floor((TRAVEL_DATE - now.getTime()) / 86400000);
      new Notification("Good Morning!", { body: `${days} days until London! 🇬🇧` });
      localStorage.setItem('last_notif', now.toDateString());
    }
  }
}

// STARTUP — open IndexedDB first, then load everything
openDB().then(async () => {
  await loadLocal();
  fetchWeather();
  if (localStorage.getItem('dropbox_token')) {
    document.getElementById('tokenInput').value = localStorage.getItem('dropbox_token');
    syncFromCloud();
  }
  setInterval(updateCD, 1000);
  setInterval(checkNotif, 60000 * 15);
  updateCD();
  if (Notification.permission === 'granted') document.getElementById('notifStatus').textContent = 'Alerts: Active';
});
</script>
