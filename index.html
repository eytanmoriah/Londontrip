<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --red: #DC143C;
    --red-dark: #b01030;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
    --glass-blur: blur(18px);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920&q=80'); background-size: cover; background-position: center 30%; filter: brightness(0.45) saturate(1.2); }
  .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(5,5,20,0.3) 0%, rgba(10,10,30,0.5) 60%, rgba(5,5,15,0.85) 100%); }
  
  .airplane { position: fixed; top: 28px; left: -80px; font-size: 2rem; z-index: 100; animation: fly 12s linear infinite; }
  @keyframes fly { 0% { left: -80px; top: 28px; } 100% { left: calc(100vw + 80px); top: 18px; } }

  .container { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 30px 20px 60px; }
  .header { text-align: center; margin-bottom: 36px; padding-top: 60px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 7vw, 5rem); font-weight: 900; }
  .header h1 span { color: var(--red); }

  .glass { background: var(--glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px; margin-bottom: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }

  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center; }
  .countdown-item .num { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; }
  
  .btn { padding: 10px 20px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid var(--glass-border); }

  .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="text"] { flex: 1; padding: 10px 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }

  .shopping-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 8px; }
  .shopping-item.checked { opacity: 0.5; text-decoration: line-through; }
  .item-name { flex: 1; }
  .item-delete { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; }

  .ticket-card { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .ticket-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="airplane">✈️</div>

<div class="container">
  <div class="header">
    <h1>London<span>.</span></h1>
    <p>May 11, 2026 · 3:00 PM</p>
  </div>

  <div class="sync-bar glass" style="display:flex; justify-content: space-between; align-items: center;">
    <div id="syncStatus" style="font-size: 0.8rem; color: var(--text-muted);">Ready</div>
    <div style="display:flex; gap: 10px;">
      <button class="btn btn-glass btn-sm" style="font-size:0.7rem;" onclick="requestNotifPermission()">🔔 Enable Notifications</button>
      <button class="btn btn-glass btn-sm" style="font-size:0.7rem;" onclick="syncFromCloud()">🔄 Sync</button>
    </div>
  </div>

  <details class="glass" style="padding: 15px;">
    <summary style="color:var(--text-muted); cursor:pointer;">⚙️ Dropbox Settings</summary>
    <div class="input-row" style="margin-top:10px">
      <input type="text" id="tokenInput" placeholder="Paste Dropbox Token..." />
      <button class="btn btn-red" onclick="saveToken()">Save</button>
    </div>
  </details>

  <div class="glass">
    <div class="section-title">⏳ Countdown</div>
    <div class="countdown-grid">
      <div class="countdown-item"><div class="num" id="cdDays">--</div><div class="label">Days</div></div>
      <div class="countdown-item"><div class="num" id="cdHours">--</div><div class="label">Hours</div></div>
      <div class="countdown-item"><div class="num" id="cdMins">--</div><div class="label">Mins</div></div>
    </div>
  </div>

  <div class="glass">
    <div class="section-title">🛍️ Buy for Trip</div>
    <div class="input-row">
      <input type="text" id="shopInput" placeholder="New item..." onkeydown="if(event.key==='Enter')addItem('shopping', 'shopInput')" />
      <button class="btn btn-red" onclick="addItem('shopping', 'shopInput')">+ Add</button>
    </div>
    <div id="shopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">🇬🇧 Shopping in the UK</div>
    <div class="input-row">
      <input type="text" id="ukShopInput" placeholder="New item..." onkeydown="if(event.key==='Enter')addItem('ukShopping', 'ukShopInput')" />
      <button class="btn btn-red" onclick="addItem('ukShopping', 'ukShopInput')">+ Add</button>
    </div>
    <div id="ukShopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">📦 Packing List</div>
    <div class="input-row">
      <input type="text" id="packInput" placeholder="New item..." onkeydown="if(event.key==='Enter')addItem('packing', 'packInput')" />
      <button class="btn btn-red" onclick="addItem('packing', 'packInput')">+ Add</button>
    </div>
    <div id="packList"></div>
  </div>

  <div class="glass">
    <div class="section-title">🎟️ Ticket Vault</div>
    <div class="input-row">
      <input type="text" id="ticketName" placeholder="Ticket description..." />
      <input type="file" id="ticketFile" accept="image/*" style="display:none" onchange="handleTicketFile()" />
      <button class="btn btn-glass" onclick="document.getElementById('ticketFile').click()">📎 Image</button>
      <button class="btn btn-red" onclick="addTicket()">+ Save</button>
    </div>
    <div id="ticketList"></div>
  </div>
</div>

<div class="modal-overlay" id="imgModal" onclick="this.classList.remove('open')">
  <img id="modalImg" style="max-width:90%; max-height:90%; border-radius:10px;" />
</div>

<script>
const TRAVEL_DATE = new Date('2026-05-11T15:00:00');
const DROPBOX_FILE = '/trip_data.json';
let state = { shopping: [], ukShopping: [], packing: [], tickets: [] };
let pendingTicketImage = null;

// ========= CORE LOGIC =========
function saveLocal() { localStorage.setItem('london_trip_v4', JSON.stringify(state)); }
function loadLocal() { 
    const raw = localStorage.getItem('london_trip_v4'); 
    if (raw) state = JSON.parse(raw); 
    render(); 
}

function addItem(listKey, inputId) {
  const inp = document.getElementById(inputId);
  if (!inp.value.trim()) return;
  state[listKey].push({ id: Date.now(), name: inp.value.trim(), checked: false });
  inp.value = '';
  saveAndSync();
}

function toggleItem(listKey, id) {
  const item = state[listKey].find(i => i.id === id);
  if (item) {
    item.checked = !item.checked;
    if (listKey === 'shopping' && item.checked) {
      if(confirm(`Move "${item.name}" to Packing List?`)) {
        state.packing.push({ id: Date.now(), name: item.name, checked: false });
        state.shopping = state.shopping.filter(i => i.id !== id);
      }
    }
  }
  saveAndSync();
}

function deleteItem(listKey, id) {
  state[listKey] = state[listKey].filter(i => i.id !== id);
  saveAndSync();
}

// ========= TICKETS =========
function handleTicketFile() {
  const file = document.getElementById('ticketFile').files[0];
  const reader = new FileReader();
  reader.onload = e => { pendingTicketImage = e.target.result; };
  reader.readAsDataURL(file);
}

function addTicket() {
  const name = document.getElementById('ticketName').value.trim();
  if (!name) return;
  state.tickets.push({ id: Date.now(), name, imageData: pendingTicketImage });
  document.getElementById('ticketName').value = '';
  pendingTicketImage = null;
  saveAndSync();
}

// ========= DROPBOX =========
function saveToken() {
  localStorage.setItem('dropbox_token', document.getElementById('tokenInput').value.trim());
  syncFromCloud();
}

async function syncToCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  document.getElementById('syncStatus').textContent = 'Cloud Saving...';
  try {
    await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/octet-stream', 'Dropbox-API-Arg': JSON.stringify({ path: DROPBOX_FILE, mode: 'overwrite' }) },
      body: JSON.stringify(state)
    });
    document.getElementById('syncStatus').textContent = 'Cloud Synced ✅';
  } catch (e) { document.getElementById('syncStatus').textContent = 'Sync Error ❌'; }
}

async function syncFromCloud() {
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  try {
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path: DROPBOX_FILE }) }
    });
    if (res.ok) { state = await res.json(); saveLocal(); render(); }
  } catch (e) { console.error(e); }
}

function saveAndSync() { saveLocal(); render(); syncToCloud(); }

// ========= NOTIFICATIONS =========
function requestNotifPermission() {
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      new Notification("London Trip", { body: "Morning countdown notifications enabled!" });
    }
  });
}

function checkMorningNotification() {
  const now = new Date();
  const lastSent = localStorage.getItem('last_morning_notif');
  const todayStr = now.toDateString();

  // If it's between 9:00 AM and 10:00 AM and we haven't sent one today
  if (now.getHours() === 9 && lastSent !== todayStr) {
    if (Notification.permission === "granted") {
      const diff = TRAVEL_DATE - now;
      const days = Math.floor(diff / 86400000);
      new Notification("Good Morning!", {
        body: `Only ${days} days until London! 🇬🇧`,
        icon: "data:image/svg+xml;base64,..."
      });
      localStorage.setItem('last_morning_notif', todayStr);
    }
  }
}

// ========= UI RENDER =========
function render() {
  const lists = [{k:'shopping', e:'shopList'}, {k:'ukShopping', e:'ukShopList'}, {k:'packing', e:'packList'}];
  lists.forEach(l => {
    document.getElementById(l.e).innerHTML = state[l.k].map(i => `
      <div class="shopping-item ${i.checked ? 'checked' : ''}">
        <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem('${l.k}', ${i.id})">
        <span class="item-name">${i.name}</span>
        <button class="item-delete" onclick="deleteItem('${l.k}', ${i.id})">✕</button>
      </div>`).join('');
  });
  document.getElementById('ticketList').innerHTML = state.tickets.map(t => `
    <div class="ticket-card" onclick="openTicket('${t.imageData}')">
      <img src="${t.imageData}" class="ticket-thumb">
      <span>${t.name}</span>
    </div>`).join('');
}

function openTicket(src) { document.getElementById('modalImg').src = src; document.getElementById('imgModal').classList.add('open'); }

function updateCountdown() {
  const diff = TRAVEL_DATE - new Date();
  if (diff <= 0) return;
  document.getElementById('cdDays').textContent = Math.floor(diff / 86400000);
  document.getElementById('cdHours').textContent = Math.floor((diff % 86400000) / 3600000);
  document.getElementById('cdMins').textContent = Math.floor((diff % 3600000) / 60000);
}

// Init
loadLocal();
if (localStorage.getItem('dropbox_token')) syncFromCloud();
setInterval(updateCountdown, 1000);
setInterval(checkMorningNotification, 60000 * 30); // Check every 30 mins
updateCountdown();
checkMorningNotification();
</script>
</body>
</html>
