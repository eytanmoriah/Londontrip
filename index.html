<style>
  :root {
    --red: #DC143C;
    --red-dark: #b01030;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
    --glass-blur: blur(18px);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; color: var(--text); background: #0a0a1a; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1920&q=80'); background-size: cover; background-position: center 30%; filter: brightness(0.45) saturate(1.2); }
  .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(5,5,20,0.3) 0%, rgba(10,10,30,0.5) 60%, rgba(5,5,15,0.85) 100%); }
  
  .container { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 30px 20px 60px; }
  .header { text-align: center; margin-bottom: 36px; padding-top: 60px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 7vw, 5rem); font-weight: 900; line-height: 1; text-shadow: 0 4px 30px rgba(0,0,0,0.5); }
  .header h1 span { color: var(--red); }

  .glass { background: var(--glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px; margin-bottom: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }

  .btn { padding: 10px 20px; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-glass { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid var(--glass-border); }
  
  .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="text"] { flex: 1; padding: 10px 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }

  .shopping-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 8px; }
  .shopping-item.checked { opacity: 0.55; }
  .shopping-item.checked .item-name { text-decoration: line-through; }
  .item-name { flex: 1; font-size: 0.9rem; }
  .item-delete { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 1.1rem; }
  .empty-state { text-align: center; color: var(--text-muted); padding: 20px; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="container">
  <div class="header">
    <h1>London<span>.</span></h1>
    <p>May 11, 2026</p>
  </div>

  <details class="glass" style="padding: 15px;">
    <summary style="color:var(--text-muted); cursor:pointer;">⚙️ Dropbox Settings</summary>
    <div class="input-row" style="margin-top:10px">
      <input type="text" id="tokenInput" placeholder="Access Token..." />
      <button class="btn btn-red" onclick="saveToken()">Save</button>
    </div>
  </details>

  <div class="glass">
    <div class="section-title">🛍️ Shopping (Before Trip)</div>
    <div class="input-row">
      <input type="text" id="shopInput" placeholder="Items to buy now..." onkeydown="if(event.key==='Enter')addItem('shopping', 'shopInput')" />
      <button class="btn btn-red" onclick="addItem('shopping', 'shopInput')">+ Add</button>
    </div>
    <div id="shopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">🇬🇧 Shopping (In London)</div>
    <div class="input-row">
      <input type="text" id="ukShopInput" placeholder="Things to get in the UK..." onkeydown="if(event.key==='Enter')addItem('ukShopping', 'ukShopInput')" />
      <button class="btn btn-red" onclick="addItem('ukShopping', 'ukShopInput')">+ Add</button>
    </div>
    <div id="ukShopList"></div>
  </div>

  <div class="glass">
    <div class="section-title">📦 Packing Checklist</div>
    <div class="input-row">
      <input type="text" id="packInput" placeholder="Suitcase items..." onkeydown="if(event.key==='Enter')addItem('packing', 'packInput')" />
      <button class="btn btn-red" onclick="addItem('packing', 'packInput')">+ Add</button>
    </div>
    <div id="packList"></div>
  </div>

</div>

<script>
let state = {
  shopping: [],
  ukShopping: [],
  packing: []
};

function saveLocal() { localStorage.setItem('london_trip_data', JSON.stringify(state)); }
function loadLocal() {
  const raw = localStorage.getItem('london_trip_data');
  if (raw) state = JSON.parse(raw);
  render();
}

function addItem(listKey, inputId) {
  const inp = document.getElementById(inputId);
  if (!inp.value.trim()) return;
  state[listKey].push({ id: Date.now(), name: inp.value.trim(), checked: false });
  inp.value = '';
  saveAndSync();
}

function toggleItem(listKey, id) {
  const item = state[listKey].find(i => i.id === id);
  if (item) {
    item.checked = !item.checked;
    // Feature: If pre-trip shopping is checked, ask to move to packing
    if (listKey === 'shopping' && item.checked) {
      if(confirm(`Move "${item.name}" to Packing List?`)) {
        state.packing.push({ id: Date.now(), name: item.name, checked: false });
        state.shopping = state.shopping.filter(i => i.id !== id);
      }
    }
  }
  saveAndSync();
}

function deleteItem(listKey, id) {
  state[listKey] = state[listKey].filter(i => i.id !== id);
  saveAndSync();
}

function render() {
  const configs = [
    { key: 'shopping', el: 'shopList', empty: 'Nothing to buy yet.' },
    { key: 'ukShopping', el: 'ukShopList', empty: 'No UK shopping planned.' },
    { key: 'packing', el: 'packList', empty: 'Suitcase is empty!' }
  ];

  configs.forEach(conf => {
    const div = document.getElementById(conf.el);
    div.innerHTML = state[conf.key].length ? state[conf.key].map(i => `
      <div class="shopping-item ${i.checked ? 'checked' : ''}">
        <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem('${conf.key}', ${i.id})">
        <span class="item-name">${i.name}</span>
        <button class="item-delete" onclick="deleteItem('${conf.key}', ${i.id})">✕</button>
      </div>`).join('') : `<div class="empty-state">${conf.empty}</div>`;
  });
}

async function saveAndSync() {
  saveLocal();
  render();
  const token = localStorage.getItem('dropbox_token');
  if (!token) return;
  
  try {
    await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/octet-stream',
        'Dropbox-API-Arg': JSON.stringify({ path: '/trip_data.json', mode: 'overwrite' })
      },
      body: JSON.stringify(state)
    });
  } catch (e) { console.error('Cloud sync failed'); }
}

function saveToken() {
  localStorage.setItem('dropbox_token', document.getElementById('tokenInput').value.trim());
  alert('Token saved!');
}

loadLocal();
</script>
</body>
</html>
